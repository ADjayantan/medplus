<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genezenz Pharmacy Admin</title>
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1f36, #2563eb);
    font-family: sans-serif;
  }
  .loader {
    text-align: center;
    color: rgba(255,255,255,0.8);
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p>Loading Admin Panel…</p>
</div>
<script>
  // ── Secret Admin Gateway ──────────────────────────────────────
  // This page is the ONLY legitimate entry point to the admin panel.
  // It sets a sessionStorage flag that all admin pages check.
  // Without visiting this URL first, admin pages are inaccessible.
  // ─────────────────────────────────────────────────────────────
  sessionStorage.setItem('adminGateway', 'genezenz-pharmacy-admin-2025');
  // Redirect to login (or dashboard if already authenticated)
  setTimeout(function () {
    const user = JSON.parse(localStorage.getItem('genezenz-pharmacy_user') || 'null');
    if (user && user.isAdmin) {
      window.location.href = '../admin-dashboard.html';
    } else {
      window.location.href = '../admin-login.html';
    }
  }, 600);
</script>
<script src="../js/chatbot.js"></script>
</body>
</html>
