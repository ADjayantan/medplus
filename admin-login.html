<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — MedPlus</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a1f36, #2563eb); }
.login-card {
  background: #fff; border-radius: 20px; padding: 48px 40px;
  width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3);
}
.login-brand { text-align: center; margin-bottom: 32px; }
.login-brand-icon { font-size: 48px; color: #2563eb; margin-bottom: 12px; }
.login-brand h1 { font-size: 24px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.login-brand p  { font-size: 14px; color: #64748b; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
  font-size: 15px; color: #1e293b; outline: none; box-sizing: border-box; transition: border 0.2s;
}
.form-input:focus { border-color: #2563eb; }
.btn-login {
  width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none;
  border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
  transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-login:hover { background: #1d4ed8; }
.alert-error { background: #fef2f2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
.back-link { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
.back-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-icon"><i class="fas fa-pills"></i></div>
    <h1>MedPlus Admin</h1>
    <p>Sign in to access the admin panel</p>
  </div>

  <div class="alert-error" id="login-error"></div>

  <div class="form-group">
    <label class="form-label"><i class="fas fa-envelope" style="margin-right:6px"></i>Email</label>
    <input class="form-input" type="email" id="admin-email" placeholder="admin@medplus.com" value="admin@medplus.com">
  </div>
  <div class="form-group">
    <label class="form-label"><i class="fas fa-lock" style="margin-right:6px"></i>Password</label>
    <input class="form-input" type="password" id="admin-password" placeholder="Password" value="Admin@123"
           onkeydown="if(event.key==='Enter') doAdminLogin()">
  </div>
  <button class="btn-login" onclick="doAdminLogin()">
    <i class="fas fa-sign-in-alt"></i> Sign In
  </button>

  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Store</a>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// ── Gateway Guard ─────────────────────────────────────────────
// Admin pages are only accessible via /Admin entry point.
// If the session flag is missing, block access entirely.
if (sessionStorage.getItem('adminGateway') !== 'medplus-admin-2025') {
  document.body.innerHTML = '';
  window.location.replace('index.html');
} else {
  // Redirect if already admin
  const u = currentUser();
  if (u && u.isAdmin) window.location.href = 'admin-dashboard.html';
}
// ─────────────────────────────────────────────────────────────

async function doAdminLogin() {
  const email    = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Email and password required'; errEl.style.display = ''; return; }
  try {
    const data = await AuthAPI.login({ email, password });
    if (!data.user.isAdmin) throw new Error('Access denied — admin account required');
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = 'admin-dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = '';
  }
}
</script>
</body>
</html>
