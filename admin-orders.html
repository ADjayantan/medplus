<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Genezenz Pharmacy Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
<style>
.search-wrap { position: relative; flex: 1; min-width: 220px; }
.search-wrap input { width: 100%; box-sizing: border-box; padding-left: 34px !important; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; pointer-events: none; z-index: 1; }
.search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; transition: color .15s; z-index: 1; display: none; }
.search-clear:hover { color: #475569; }
.search-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.12); z-index: 9999; max-height: 400px; overflow-y: auto; }
.search-dropdown.open { display: block; }
.sd-header { padding: 8px 14px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
.sd-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; transition: background .12s; border-bottom: 1px solid #f8fafc; }
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.sd-active { background: #f0f9ff; }
.sd-avatar { width: 36px; height: 36px; border-radius: 8px; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #0369a1; flex-shrink: 0; }
.sd-info { flex: 1; min-width: 0; }
.sd-name { font-size: 13px; font-weight: 600; color: #0f172a; }
.sd-name mark { background: #fef08a; color: #92400e; border-radius: 2px; padding: 0 1px; }
.sd-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
.sd-right { text-align: right; flex-shrink: 0; }
.sd-price { font-size: 13px; font-weight: 700; color: #0f172a; }
.sd-empty { padding: 22px 16px; text-align: center; color: #94a3b8; font-size: 13px; }
.sd-empty i { font-size: 20px; display: block; margin-bottom: 6px; color: #cbd5e1; }
.badge-pending   { background:#fef9c3;color:#a16207; }
.badge-confirmed { background:#dbeafe;color:#1d4ed8; }
.badge-shipped   { background:#e0f2fe;color:#0369a1; }
.badge-delivered { background:#dcfce7;color:#15803d; }
.badge-cancelled { background:#fee2e2;color:#b91c1c; }
</style>
</head>
<body>
<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCI+CiAgPHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIHJ4PSIyMCIgZmlsbD0iIzBkOTQ4OCIvPgogIDxyZWN0IHg9IjQyIiB5PSIyMCIgd2lkdGg9IjE2IiBoZWlnaHQ9IjYwIiByeD0iOCIgZmlsbD0id2hpdGUiLz4KICA8cmVjdCB4PSIyMCIgeT0iNDIiIHdpZHRoPSI2MCIgaGVpZ2h0PSIxNiIgcng9IjgiIGZpbGw9IndoaXRlIi8+Cjwvc3ZnPgo=" alt="Logo" style="height:36px;width:36px;object-fit:contain;border-radius:8px;flex-shrink:0;">
      <div><div class="brand-name">Genezenz Pharmacy</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="admin-dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span>Dashboard</span></a>
      <div class="nav-section">Catalogue</div>
      <a href="admin-products.html" class="nav-item"><span class="nav-icon"><i class="fas fa-pills"></i></span><span>Products</span></a>
      <div class="nav-section">Operations</div>
      <a href="admin-orders.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-box"></i></span><span>Orders</span></a>
      <a href="admin-prescriptions.html" class="nav-item"><span class="nav-icon"><i class="fas fa-file-prescription"></i></span><span>Prescriptions</span></a>
    </nav>
    <div class="sidebar-footer"><a href="index.html"><i class="fas fa-home"></i> <span>Back to Store</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title">Orders <span>Manage all orders</span></div>
      <div class="topbar-actions">
        <span id="admin-name" style="font-size:14px;color:#64748b"></span>
        <div class="admin-avatar" id="admin-avatar">A</div>
        <button class="btn btn-ghost btn-sm" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="admin-content">
      <div id="alert-area"></div>
      <div class="filter-bar">
        <div class="search-wrap" id="search-wrap">
          <span class="search-icon"><i class="fas fa-search"></i></span>
          <input type="text" id="search-input" placeholder="Search by customer name or order ID..." autocomplete="off" oninput="onOrderSearchInput()" onkeydown="onOrderSearchKey(event)" onfocus="showOrderDropdown()">
          <button class="search-clear" id="search-clear" onclick="clearOrderSearch()" title="Clear"><i class="fas fa-times"></i></button>
          <div class="search-dropdown" id="order-dropdown"></div>
        </div>
        <select id="status-filter" onchange="loadOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <span id="order-count" style="color:#64748b;font-size:13px;white-space:nowrap"></span>
      </div>
      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th>
                <th>Payment</th><th>Date</th><th>Status</th><th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="8" class="loading-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="order-modal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3><i class="fas fa-box"></i> Order Details</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let allOrders=[], sdOrders=[], sdOrderIdx=-1;

function adminLogout(){localStorage.removeItem('genezenz-pharmacy_token');localStorage.removeItem('genezenz-pharmacy_user');sessionStorage.removeItem('adminGateway');window.location.href='index.html';}
function showAlert(msg,type){document.getElementById('alert-area').innerHTML=`<div class="alert alert-${type||'danger'}"><i class="fas fa-${type==='success'?'check-circle':'exclamation-triangle'}"></i> ${msg}</div>`;if(type==='success')setTimeout(()=>document.getElementById('alert-area').innerHTML='',3000);}
function badgeHtml(s){const m={pending:'badge-pending',confirmed:'badge-confirmed',shipped:'badge-shipped',delivered:'badge-delivered',cancelled:'badge-cancelled'};return`<span class="badge ${m[s]||''}">${s}</span>`;}
function formatDate(d){return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlMatch(text,q){const words=(q||'').trim().split(/\s+/).filter(Boolean);let out=escH(text);words.forEach(w=>{const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');out=out.replace(re,'<mark>$1</mark>');});return out;}

function onOrderSearchInput(){
  const q=document.getElementById('search-input').value;
  document.getElementById('search-clear').style.display=q?'block':'none';
  buildOrderDropdown(q); renderOrders();
}

function buildOrderDropdown(q){
  const dd=document.getElementById('order-dropdown');
  const raw=(q||'').trim().toLowerCase();
  if(!raw){dd.classList.remove('open');sdOrders=[];return;}
  const matched=allOrders.filter(o=>
    o._id.slice(-6).toLowerCase().includes(raw)||
    (o.userId?.name||'').toLowerCase().includes(raw)||
    (o.userId?.email||'').toLowerCase().includes(raw)||
    (o.address||'').toLowerCase().includes(raw)
  );
  sdOrders=matched.slice(0,7); sdOrderIdx=-1;
  if(!sdOrders.length){dd.innerHTML=`<div class="sd-empty"><i class="fas fa-search"></i>No orders match "<strong>${escH(q)}</strong>"</div>`;dd.classList.add('open');return;}
  const sc={pending:'#a16207',confirmed:'#1d4ed8',shipped:'#0369a1',delivered:'#15803d',cancelled:'#b91c1c'};
  let html=`<div class="sd-header"><i class="fas fa-box" style="color:#6366f1;margin-right:4px"></i>${matched.length} order${matched.length!==1?'s':''} found</div>`;
  sdOrders.forEach((o,i)=>{
    const name=o.userId?.name||'Unknown';
    const initials=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    html+=`<div class="sd-item" data-idx="${i}" onmousedown="selectOrderSuggestion('${o._id}')" onmouseenter="setOrderActive(${i})">
      <div class="sd-avatar">${initials}</div>
      <div class="sd-info">
        <div class="sd-name">${hlMatch(name,q)} <span style="font-family:monospace;font-size:11px;color:#94a3b8;font-weight:400">#${o._id.slice(-6).toUpperCase()}</span></div>
        <div class="sd-meta">${escH(o.userId?.email||'')} &middot; ${o.items.length} item${o.items.length!==1?'s':''} &middot; ${formatDate(o.createdAt)}</div>
      </div>
      <div class="sd-right">
        <div class="sd-price">&#8377;${o.total.toLocaleString('en-IN')}</div>
        <span style="font-size:10px;font-weight:700;color:${sc[o.status]||'#64748b'}">${o.status}</span>
      </div>
      <div style="color:#94a3b8;font-size:11px;margin-left:6px"><i class="fas fa-eye"></i></div>
    </div>`;
  });
  if(matched.length>7)html+=`<div class="sd-header" style="border-top:1px solid #f1f5f9;border-bottom:none;text-align:center;color:#64748b;cursor:pointer;font-weight:600" onmousedown="closeOrderDropdown()">+${matched.length-7} more — press Enter to see all</div>`;
  dd.innerHTML=html; dd.classList.add('open');
}

function setOrderActive(i){sdOrderIdx=i;document.querySelectorAll('#order-dropdown .sd-item').forEach((el,idx)=>el.classList.toggle('sd-active',idx===i));}
function onOrderSearchKey(e){const dd=document.getElementById('order-dropdown');if(!dd.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();setOrderActive(Math.min(sdOrderIdx+1,sdOrders.length-1));}else if(e.key==='ArrowUp'){e.preventDefault();setOrderActive(Math.max(sdOrderIdx-1,0));}else if(e.key==='Enter'){e.preventDefault();if(sdOrderIdx>=0&&sdOrders[sdOrderIdx])selectOrderSuggestion(sdOrders[sdOrderIdx]._id);else closeOrderDropdown();}else if(e.key==='Escape')closeOrderDropdown();}
function selectOrderSuggestion(id){closeOrderDropdown();viewOrder(id);}
function showOrderDropdown(){const q=document.getElementById('search-input').value.trim();if(q)buildOrderDropdown(q);}
function closeOrderDropdown(){document.getElementById('order-dropdown').classList.remove('open');sdOrderIdx=-1;}
function clearOrderSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';closeOrderDropdown();renderOrders();}
document.addEventListener('mousedown',e=>{if(!document.getElementById('search-wrap').contains(e.target))closeOrderDropdown();});

async function loadOrders(){
  const status=document.getElementById('status-filter').value;
  try{
    const data=await OrderAPI.all(status?{status,limit:100}:{limit:100});
    allOrders=data.orders||[]; renderOrders();
  }catch(err){
    if(err.message.includes('401')||err.message.includes('403'))window.location.href='admin-login.html';
    else document.getElementById('orders-tbody').innerHTML=`<tr><td colspan="8" style="text-align:center;color:#ef4444;padding:24px"><i class="fas fa-exclamation-circle"></i> ${err.message}</td></tr>`;
  }
}

function renderOrders(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let filtered=allOrders.filter(o=>!q||o._id.slice(-6).toLowerCase().includes(q)||(o.userId?.name?.toLowerCase().includes(q))||(o.userId?.email?.toLowerCase().includes(q)));
  document.getElementById('order-count').textContent=filtered.length+' orders';
  const tbody=document.getElementById('orders-tbody');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#64748b;padding:40px">No orders found</td></tr>';return;}
  tbody.innerHTML=filtered.map(o=>`
    <tr>
      <td style="font-family:monospace;font-size:13px">#${o._id.slice(-6).toUpperCase()}</td>
      <td><div style="font-weight:600">${o.userId?.name||'N/A'}</div><div style="font-size:12px;color:#64748b">${o.userId?.email||''}</div></td>
      <td>${o.items.length} item${o.items.length>1?'s':''}</td>
      <td style="font-weight:700">&#8377;${o.total.toLocaleString('en-IN')}</td>
      <td style="font-size:13px">${o.paymentMethod}</td>
      <td style="font-size:12px;color:#64748b">${formatDate(o.createdAt)}</td>
      <td>${badgeHtml(o.status)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="viewOrder('${o._id}')"><i class="fas fa-eye"></i> View</button>
        <select style="display:inline-block;width:auto;font-size:12px;padding:5px 8px;margin-left:4px;border:1.5px solid #e2e8f0;border-radius:6px;background:#fff" onchange="updateStatus('${o._id}',this.value,this)">
          <option value="">Update</option>
          <option value="pending">Pending</option><option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option><option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </td>
    </tr>`).join('');
}

async function updateStatus(id,status,sel){
  if(!status)return; sel.disabled=true;
  try{await OrderAPI.updateStatus(id,status);showAlert('Order status updated to "'+status+'"','success');loadOrders();}
  catch(err){showAlert(err.message);sel.value='';sel.disabled=false;}
}

function viewOrder(id){
  const o=allOrders.find(x=>x._id===id); if(!o)return;
  document.getElementById('order-modal-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Order ID</div>
        <div style="font-family:monospace;font-weight:700">#${o._id.slice(-8).toUpperCase()}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Date</div>
        <div style="font-size:14px">${formatDate(o.createdAt)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Status</div>
        <div>${badgeHtml(o.status)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Payment</div>
        <div style="font-size:14px">${o.paymentMethod}</div>
      </div>
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Customer</div>
        <div style="font-weight:600">${o.userId?.name||'N/A'}</div>
        <div style="font-size:13px;color:#64748b">${o.userId?.email||''}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Phone</div>
        <div style="font-size:14px">${o.phone}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Delivery Address</div>
        <div style="font-size:14px">${o.address}</div>
      </div>
    </div>
    <div style="font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0">Order Items</div>
    ${o.items.map(item=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#2563eb"><i class="fas fa-pills"></i></div>
          <div><div style="font-weight:600;font-size:14px">${item.name}</div><div style="font-size:12px;color:#64748b">Qty: ${item.qty}</div></div>
        </div>
        <div style="font-weight:700">&#8377;${(item.price*item.qty).toLocaleString('en-IN')}</div>
      </div>`).join('')}
    <div style="text-align:right;margin-top:16px;font-size:18px;font-weight:800">Total: &#8377;${o.total.toLocaleString('en-IN')}</div>`;
  document.getElementById('order-modal').classList.add('open');
}

function closeModal(){document.getElementById('order-modal').classList.remove('open');}
document.getElementById('order-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

if(sessionStorage.getItem('adminGateway')!=='genezenz-pharmacy-admin-2025'){document.body.innerHTML='';window.location.replace('admin-login.html');}
else{const u=currentUser();if(!u||!u.isAdmin){document.body.innerHTML='';window.location.replace('admin-login.html');}else{document.getElementById('admin-name').textContent=u.name||'Admin';document.getElementById('admin-avatar').textContent=(u.name||'A')[0].toUpperCase();loadOrders();}}
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
