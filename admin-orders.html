<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — MedPlus Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fas fa-pills"></i></span>
      <div><div class="brand-name">MedPlus</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="admin-dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span>Dashboard</span></a>
      <div class="nav-section">Catalogue</div>
      <a href="admin-products.html" class="nav-item"><span class="nav-icon"><i class="fas fa-pills"></i></span><span>Products</span></a>
      <div class="nav-section">Operations</div>
      <a href="admin-orders.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-box"></i></span><span>Orders</span></a>
      <a href="admin-prescriptions.html" class="nav-item"><span class="nav-icon"><i class="fas fa-file-prescription"></i></span><span>Prescriptions</span></a>
    </nav>
    <div class="sidebar-footer"><a href="index.html"><i class="fas fa-home"></i> <span>Back to Store</span></a></div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title">Orders <span>Manage all orders</span></div>
      <div class="topbar-actions">
        <span id="admin-name" style="font-size:14px;color:#64748b"></span>
        <div class="admin-avatar" id="admin-avatar">A</div>
        <button class="btn btn-ghost btn-sm" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="admin-content">
      <div id="alert-area"></div>

      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="Search by customer name or order ID..." oninput="renderOrders()">
        <select id="status-filter" onchange="loadOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <span id="order-count" style="color:#64748b;font-size:13px;white-space:nowrap"></span>
      </div>

      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Date</th>
                <th>Status</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="8" class="loading-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3><i class="fas fa-box"></i> Order Details</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let allOrders = [];

function adminLogout() {
  localStorage.removeItem('medplus_token');
  localStorage.removeItem('medplus_user');
  sessionStorage.removeItem('adminGateway');
  window.location.href = 'index.html';
}

function showAlert(msg, type) {
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert-${type || 'danger'}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i> ${msg}</div>`;
  if (type === 'success') setTimeout(() => document.getElementById('alert-area').innerHTML = '', 3000);
}

function badgeHtml(status) {
  const map = { pending:'badge-pending', confirmed:'badge-confirmed', shipped:'badge-shipped', delivered:'badge-delivered', cancelled:'badge-cancelled' };
  return `<span class="badge ${map[status] || ''}">${status}</span>`;
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

async function loadOrders() {
  const status = document.getElementById('status-filter').value;
  try {
    const data = await OrderAPI.all(status ? { status, limit: 100 } : { limit: 100 });
    allOrders  = data.orders || [];
    renderOrders();
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('403')) {
      window.location.href = 'admin-login.html';
    } else {
      document.getElementById('orders-tbody').innerHTML =
        `<tr><td colspan="8" style="text-align:center;color:#ef4444;padding:24px"><i class="fas fa-exclamation-circle"></i> ${err.message}</td></tr>`;
    }
  }
}

function renderOrders() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = allOrders.filter(o => {
    if (!q) return true;
    return o._id.slice(-6).toLowerCase().includes(q) ||
           (o.userId?.name?.toLowerCase().includes(q)) ||
           (o.userId?.email?.toLowerCase().includes(q));
  });
  document.getElementById('order-count').textContent = filtered.length + ' orders';
  const tbody = document.getElementById('orders-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#64748b;padding:40px">No orders found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(o => `
    <tr>
      <td style="font-family:monospace;font-size:13px">#${o._id.slice(-6).toUpperCase()}</td>
      <td>
        <div style="font-weight:600">${o.userId?.name || 'N/A'}</div>
        <div style="font-size:12px;color:#64748b">${o.userId?.email || ''}</div>
      </td>
      <td>${o.items.length} item${o.items.length > 1 ? 's' : ''}</td>
      <td style="font-weight:700">\u20b9${o.total.toLocaleString('en-IN')}</td>
      <td style="font-size:13px">${o.paymentMethod}</td>
      <td style="font-size:12px;color:#64748b">${formatDate(o.createdAt)}</td>
      <td>${badgeHtml(o.status)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="viewOrder('${o._id}')"><i class="fas fa-eye"></i> View</button>
        <select style="display:inline-block;width:auto;font-size:12px;padding:5px 8px;margin-left:4px;border:1.5px solid #e2e8f0;border-radius:6px;background:#fff"
          onchange="updateStatus('${o._id}', this.value, this)">
          <option value="">Update</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </td>
    </tr>
  `).join('');
}

async function updateStatus(id, status, sel) {
  if (!status) return;
  sel.disabled = true;
  try {
    await OrderAPI.updateStatus(id, status);
    showAlert('Order status updated to "' + status + '"', 'success');
    loadOrders();
  } catch (err) {
    showAlert(err.message);
    sel.value    = '';
    sel.disabled = false;
  }
}

function viewOrder(id) {
  const o = allOrders.find(x => x._id === id);
  if (!o) return;
  document.getElementById('order-modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Order ID</div>
        <div style="font-family:monospace;font-weight:700">#${o._id.slice(-8).toUpperCase()}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Date</div>
        <div style="font-size:14px">${formatDate(o.createdAt)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Status</div>
        <div>${badgeHtml(o.status)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Payment</div>
        <div style="font-size:14px">${o.paymentMethod}</div>
      </div>
      <div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Customer</div>
        <div style="font-weight:600">${o.userId?.name || 'N/A'}</div>
        <div style="font-size:13px;color:#64748b">${o.userId?.email || ''}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Phone</div>
        <div style="font-size:14px">${o.phone}</div>
        <div style="font-size:11px;color:#64748b;margin-top:12px;text-transform:uppercase">Delivery Address</div>
        <div style="font-size:14px">${o.address}</div>
      </div>
    </div>
    <div style="font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0">Order Items</div>
    ${o.items.map(item => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#2563eb">
            <i class="fas fa-pills"></i>
          </div>
          <div>
            <div style="font-weight:600;font-size:14px">${item.name}</div>
            <div style="font-size:12px;color:#64748b">Qty: ${item.qty}</div>
          </div>
        </div>
        <div style="font-weight:700">\u20b9${(item.price * item.qty).toLocaleString('en-IN')}</div>
      </div>
    `).join('')}
    <div style="text-align:right;margin-top:16px;font-size:18px;font-weight:800">
      Total: \u20b9${o.total.toLocaleString('en-IN')}
    </div>`;
  document.getElementById('order-modal').classList.add('open');
}

function closeModal() { document.getElementById('order-modal').classList.remove('open'); }
document.getElementById('order-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

/* Admin guard */
if (sessionStorage.getItem('adminGateway') !== 'medplus-admin-2025') {
  document.body.innerHTML = '';
  window.location.replace('Admin/index.html'); // must enter via proper admin entry point
} else {
  const u = currentUser();
  if (!u || !u.isAdmin) {
    document.body.innerHTML = '';
    window.location.replace('admin-login.html');
  } else {
    document.getElementById('admin-name').textContent   = u.name || 'Admin';
    document.getElementById('admin-avatar').textContent = (u.name || 'A')[0].toUpperCase();
    loadOrders();
  }
}
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
