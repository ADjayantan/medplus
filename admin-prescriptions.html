<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptions — Genezenz Pharmacy Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
<style>
.search-wrap { position: relative; flex: 1; min-width: 220px; }
.search-wrap input { width: 100%; box-sizing: border-box; padding-left: 34px !important; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; pointer-events: none; z-index: 1; }
.search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; transition: color .15s; z-index: 1; display: none; }
.search-clear:hover { color: #475569; }
.search-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.12); z-index: 9999; max-height: 400px; overflow-y: auto; }
.search-dropdown.open { display: block; }
.sd-header { padding: 8px 14px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
.sd-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; transition: background .12s; border-bottom: 1px solid #f8fafc; }
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.sd-active { background: #f0f9ff; }
.sd-avatar { width: 36px; height: 36px; border-radius: 8px; background: #ede9fe; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #7c3aed; flex-shrink: 0; }
.sd-info { flex: 1; min-width: 0; }
.sd-name { font-size: 13px; font-weight: 600; color: #0f172a; }
.sd-name mark { background: #fef08a; color: #92400e; border-radius: 2px; padding: 0 1px; }
.sd-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
.sd-right { text-align: right; flex-shrink: 0; }
.sd-empty { padding: 22px 16px; text-align: center; color: #94a3b8; font-size: 13px; }
.sd-empty i { font-size: 20px; display: block; margin-bottom: 6px; color: #cbd5e1; }
</style>
</head>
<body>
<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="Logo" style="height:36px;width:36px;object-fit:contain;border-radius:8px;flex-shrink:0;">
      <div><div class="brand-name">Genezenz Pharmacy</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="admin-dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span>Dashboard</span></a>
      <div class="nav-section">Catalogue</div>
      <a href="admin-products.html" class="nav-item"><span class="nav-icon"><i class="fas fa-pills"></i></span><span>Products</span></a>
      <div class="nav-section">Operations</div>
      <a href="admin-orders.html" class="nav-item"><span class="nav-icon"><i class="fas fa-box"></i></span><span>Orders</span></a>
      <a href="admin-prescriptions.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-file-prescription"></i></span><span>Prescriptions</span></a>
    </nav>
    <div class="sidebar-footer"><a href="index.html"><i class="fas fa-home"></i> <span>Back to Store</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title">Prescriptions <span>Review and approve</span></div>
      <div class="topbar-actions">
        <span id="admin-name" style="font-size:14px;color:#64748b"></span>
        <div class="admin-avatar" id="admin-avatar">A</div>
        <button class="btn btn-ghost btn-sm" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="admin-content">
      <div id="alert-area"></div>
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card"><div class="stat-icon yellow"><i class="fas fa-clock"></i></div><div><div class="stat-label">Pending</div><div class="stat-value" id="cnt-pending">—</div></div></div>
        <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="stat-label">Approved</div><div class="stat-value" id="cnt-approved">—</div></div></div>
        <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div><div class="stat-label">Rejected</div><div class="stat-value" id="cnt-rejected">—</div></div></div>
        <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-file-prescription"></i></div><div><div class="stat-label">Total</div><div class="stat-value" id="cnt-total">—</div></div></div>
      </div>
      <div class="filter-bar">
        <div class="search-wrap" id="search-wrap">
          <span class="search-icon"><i class="fas fa-search"></i></span>
          <input type="text" id="search-input" placeholder="Search by patient name or email..." autocomplete="off"
                 oninput="onRxSearchInput()" onkeydown="onRxSearchKey(event)" onfocus="showRxDropdown()">
          <button class="search-clear" id="search-clear" onclick="clearRxSearch()" title="Clear"><i class="fas fa-times"></i></button>
          <div class="search-dropdown" id="rx-dropdown"></div>
        </div>
        <select id="status-filter" onchange="loadPrescriptions()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <span id="rx-count" style="color:#64748b;font-size:13px"></span>
      </div>
      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>Patient</th><th>File</th><th>Uploaded</th><th>Status</th><th>Admin Note</th><th style="text-align:right">Actions</th></tr>
            </thead>
            <tbody id="rx-tbody">
              <tr><td colspan="6" class="loading-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="review-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3><i class="fas fa-file-prescription"></i> Review Prescription</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="review-id">
      <div id="preview-container" style="margin-bottom:20px;text-align:center"></div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Patient</div>
        <div style="font-weight:600" id="review-patient">—</div>
      </div>
      <div class="form-group">
        <label class="form-label">Admin Note (optional)</label>
        <textarea class="form-control" id="review-note" rows="3" placeholder="Add a note for the patient..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="submitReview('rejected')"><i class="fas fa-times-circle"></i> Reject</button>
      <button class="btn btn-success" onclick="submitReview('approved')"><i class="fas fa-check-circle"></i> Approve</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let allRx=[], sdRx=[], sdRxIdx=-1;

function adminLogout(){localStorage.removeItem('genezenz-pharmacy_token');localStorage.removeItem('genezenz-pharmacy_user');sessionStorage.removeItem('adminGateway');window.location.href='index.html';}
function showAlert(msg,type){document.getElementById('alert-area').innerHTML=`<div class="alert alert-${type||'danger'}"><i class="fas fa-${type==='success'?'check-circle':'exclamation-triangle'}"></i> ${msg}</div>`;if(type==='success')setTimeout(()=>document.getElementById('alert-area').innerHTML='',3000);}
function badgeHtml(s){const m={pending:'badge-review',approved:'badge-approved',rejected:'badge-rejected'};return`<span class="badge ${m[s]||''}">${s}</span>`;}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlMatch(text,q){const words=(q||'').trim().split(/\s+/).filter(Boolean);let out=escH(text);words.forEach(w=>{const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');out=out.replace(re,'<mark>$1</mark>');});return out;}

/* ── Prescription search dropdown ── */
function onRxSearchInput(){
  const q=document.getElementById('search-input').value;
  document.getElementById('search-clear').style.display=q?'block':'none';
  buildRxDropdown(q); renderTable();
}

function buildRxDropdown(q){
  const dd=document.getElementById('rx-dropdown');
  const raw=(q||'').trim().toLowerCase();
  if(!raw){dd.classList.remove('open');sdRx=[];return;}
  const matched=allRx.filter(r=>
    (r.userId?.name||'').toLowerCase().includes(raw)||
    (r.userId?.email||'').toLowerCase().includes(raw)||
    (r.filename||'').toLowerCase().includes(raw)
  );
  sdRx=matched.slice(0,7); sdRxIdx=-1;
  if(!sdRx.length){dd.innerHTML=`<div class="sd-empty"><i class="fas fa-search"></i>No prescriptions match "<strong>${escH(q)}</strong>"</div>`;dd.classList.add('open');return;}
  const sc={pending:'#a16207',approved:'#15803d',rejected:'#b91c1c'};
  let html=`<div class="sd-header"><i class="fas fa-file-prescription" style="color:#7c3aed;margin-right:4px"></i>${matched.length} prescription${matched.length!==1?'s':''} found</div>`;
  sdRx.forEach((r,i)=>{
    const name=r.userId?.name||'Unknown';
    const initials=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const isImg=/\.(jpg|jpeg|png)$/i.test(r.url);
    const date=new Date(r.uploadedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    html+=`<div class="sd-item" data-idx="${i}" onmousedown="selectRxSuggestion('${r._id}')" onmouseenter="setRxActive(${i})">
      <div class="sd-avatar">${initials}</div>
      <div class="sd-info">
        <div class="sd-name">${hlMatch(name,q)}</div>
        <div class="sd-meta">${escH(r.userId?.email||'')} &middot; <i class="fas ${isImg?'fa-image':'fa-file-pdf'}" style="color:#2563eb"></i> ${escH(r.filename)} &middot; ${date}</div>
      </div>
      <div class="sd-right">
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${r.status==='approved'?'#dcfce7':r.status==='rejected'?'#fee2e2':'#fef9c3'};color:${sc[r.status]||'#64748b'}">${r.status}</span>
      </div>
      <div style="color:#94a3b8;font-size:11px;margin-left:6px"><i class="fas fa-eye"></i></div>
    </div>`;
  });
  if(matched.length>7)html+=`<div class="sd-header" style="border-top:1px solid #f1f5f9;border-bottom:none;text-align:center;color:#64748b;cursor:pointer;font-weight:600" onmousedown="closeRxDropdown()">+${matched.length-7} more results</div>`;
  dd.innerHTML=html; dd.classList.add('open');
}

function setRxActive(i){sdRxIdx=i;document.querySelectorAll('#rx-dropdown .sd-item').forEach((el,idx)=>el.classList.toggle('sd-active',idx===i));}
function onRxSearchKey(e){const dd=document.getElementById('rx-dropdown');if(!dd.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();setRxActive(Math.min(sdRxIdx+1,sdRx.length-1));}else if(e.key==='ArrowUp'){e.preventDefault();setRxActive(Math.max(sdRxIdx-1,0));}else if(e.key==='Enter'){e.preventDefault();if(sdRxIdx>=0&&sdRx[sdRxIdx])selectRxSuggestion(sdRx[sdRxIdx]._id);else closeRxDropdown();}else if(e.key==='Escape')closeRxDropdown();}
function selectRxSuggestion(id){closeRxDropdown();openReview(id);}
function showRxDropdown(){const q=document.getElementById('search-input').value.trim();if(q)buildRxDropdown(q);}
function closeRxDropdown(){document.getElementById('rx-dropdown').classList.remove('open');sdRxIdx=-1;}
function clearRxSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';closeRxDropdown();renderTable();}
document.addEventListener('mousedown',e=>{if(!document.getElementById('search-wrap').contains(e.target))closeRxDropdown();});

/* ── Load & Render ── */
async function loadPrescriptions(){
  const status=document.getElementById('status-filter').value;
  try{
    const data=await PrescriptionAPI.all(status?{status,limit:100}:{limit:100});
    allRx=data.prescriptions||[];
    document.getElementById('cnt-pending').textContent=allRx.filter(r=>r.status==='pending').length;
    document.getElementById('cnt-approved').textContent=allRx.filter(r=>r.status==='approved').length;
    document.getElementById('cnt-rejected').textContent=allRx.filter(r=>r.status==='rejected').length;
    document.getElementById('cnt-total').textContent=allRx.length;
    renderTable();
  }catch(err){
    if(err.message.includes('401')||err.message.includes('403'))window.location.href='admin-login.html';
    else showAlert(err.message);
  }
}

function renderTable(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let filtered=allRx.filter(r=>!q||(r.userId?.name?.toLowerCase().includes(q))||(r.userId?.email?.toLowerCase().includes(q)));
  document.getElementById('rx-count').textContent=filtered.length+' prescriptions';
  const tbody=document.getElementById('rx-tbody');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:#64748b;padding:40px">No prescriptions found</td></tr>';return;}
  tbody.innerHTML=filtered.map(r=>{
    const date=new Date(r.uploadedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const isImg=/\.(jpg|jpeg|png)$/i.test(r.url);
    return`<tr>
      <td><div style="font-weight:600">${r.userId?.name||'N/A'}</div><div style="font-size:12px;color:#64748b">${r.userId?.email||''}</div></td>
      <td><span style="display:flex;align-items:center;gap:6px;font-size:13px"><i class="fas ${isImg?'fa-image':'fa-file-pdf'}" style="color:#2563eb"></i>${r.filename}</span></td>
      <td style="font-size:13px;color:#64748b">${date}</td>
      <td>${badgeHtml(r.status)}</td>
      <td style="font-size:13px;color:#475569;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.adminNote||'—'}</td>
      <td style="text-align:right;white-space:nowrap">
        <a href="${r.url}" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-external-link-alt"></i> View</a>
        ${r.status==='pending'
          ?`<button class="btn btn-primary btn-sm" style="margin-left:6px" onclick="openReview('${r._id}')"><i class="fas fa-check"></i> Review</button>`
          :`<button class="btn btn-ghost btn-sm" style="margin-left:6px" onclick="openReview('${r._id}')"><i class="fas fa-edit"></i> Edit</button>`}
      </td>
    </tr>`;
  }).join('');
}

function openReview(id){
  const r=allRx.find(x=>x._id===id); if(!r)return;
  document.getElementById('review-id').value=id;
  document.getElementById('review-patient').textContent=(r.userId?.name||'N/A')+' — '+(r.userId?.email||'');
  document.getElementById('review-note').value=r.adminNote||'';
  const isImg=/\.(jpg|jpeg|png)$/i.test(r.url);
  document.getElementById('preview-container').innerHTML=isImg
    ?`<img src="${r.url}" class="rx-preview" alt="Prescription">`
    :`<a href="${r.url}" target="_blank" class="btn btn-outline"><i class="fas fa-file-pdf"></i> Open PDF</a>`;
  document.getElementById('review-modal').classList.add('open');
}

async function submitReview(status){
  const id=document.getElementById('review-id').value;
  const note=document.getElementById('review-note').value.trim();
  try{await PrescriptionAPI.review(id,{status,adminNote:note});showAlert('Prescription '+status,'success');closeModal();loadPrescriptions();}
  catch(err){showAlert(err.message);}
}

function closeModal(){document.getElementById('review-modal').classList.remove('open');}
document.getElementById('review-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

if(sessionStorage.getItem('adminGateway')!=='genezenz-pharmacy-admin-2025'){document.body.innerHTML='';window.location.replace('admin-login.html');}
else{const u=currentUser();if(!u||!u.isAdmin){document.body.innerHTML='';window.location.replace('admin-login.html');}else{document.getElementById('admin-name').textContent=u.name||'Admin';document.getElementById('admin-avatar').textContent=(u.name||'A')[0].toUpperCase();loadPrescriptions();}}
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
