<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptions — Genezenz Pharmacy Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fas fa-pills"></i></span>
      <div><div class="brand-name">Genezenz Pharmacy</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="admin-dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span>Dashboard</span></a>
      <div class="nav-section">Catalogue</div>
      <a href="admin-products.html" class="nav-item"><span class="nav-icon"><i class="fas fa-pills"></i></span><span>Products</span></a>
      <div class="nav-section">Operations</div>
      <a href="admin-orders.html" class="nav-item"><span class="nav-icon"><i class="fas fa-box"></i></span><span>Orders</span></a>
      <a href="admin-prescriptions.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-file-prescription"></i></span><span>Prescriptions</span></a>
    </nav>
    <div class="sidebar-footer"><a href="index.html"><i class="fas fa-home"></i> <span>Back to Store</span></a></div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title">Prescriptions <span>Review and approve</span></div>
      <div class="topbar-actions">
        <span id="admin-name" style="font-size:14px;color:#64748b"></span>
        <div class="admin-avatar" id="admin-avatar">A</div>
        <button class="btn btn-ghost btn-sm" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="admin-content">
      <div id="alert-area"></div>

      <!-- Stats strip -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
          <div><div class="stat-label">Pending</div><div class="stat-value" id="cnt-pending">—</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
          <div><div class="stat-label">Approved</div><div class="stat-value" id="cnt-approved">—</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
          <div><div class="stat-label">Rejected</div><div class="stat-value" id="cnt-rejected">—</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-file-prescription"></i></div>
          <div><div class="stat-label">Total</div><div class="stat-value" id="cnt-total">—</div></div>
        </div>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="Search by patient name..." oninput="renderTable()">
        <select id="status-filter" onchange="loadPrescriptions()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <span id="rx-count" style="color:#64748b;font-size:13px"></span>
      </div>

      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Patient</th>
                <th>File</th>
                <th>Uploaded</th>
                <th>Status</th>
                <th>Admin Note</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="rx-tbody">
              <tr><td colspan="6" class="loading-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Review Modal -->
<div class="modal-overlay" id="review-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3><i class="fas fa-file-prescription"></i> Review Prescription</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="review-id">
      <div id="preview-container" style="margin-bottom:20px;text-align:center"></div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:#64748b;margin-bottom:4px;text-transform:uppercase">Patient</div>
        <div style="font-weight:600" id="review-patient">—</div>
      </div>
      <div class="form-group">
        <label class="form-label">Admin Note (optional)</label>
        <textarea class="form-control" id="review-note" rows="3" placeholder="Add a note for the patient..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="submitReview('rejected')"><i class="fas fa-times-circle"></i> Reject</button>
      <button class="btn btn-success" onclick="submitReview('approved')"><i class="fas fa-check-circle"></i> Approve</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let allRx = [];

function adminLogout() {
  localStorage.removeItem('genezenz-pharmacy_token');
  localStorage.removeItem('genezenz-pharmacy_user');
  sessionStorage.removeItem('adminGateway');
  window.location.href = 'index.html';
}

function showAlert(msg, type) {
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert-${type || 'danger'}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i> ${msg}</div>`;
  if (type === 'success') setTimeout(() => document.getElementById('alert-area').innerHTML = '', 3000);
}

function badgeHtml(status) {
  const map = { pending:'badge-review', approved:'badge-approved', rejected:'badge-rejected' };
  return `<span class="badge ${map[status] || ''}">${status}</span>`;
}

async function loadPrescriptions() {
  const status = document.getElementById('status-filter').value;
  try {
    const data = await PrescriptionAPI.all(status ? { status, limit: 100 } : { limit: 100 });
    allRx = data.prescriptions || [];

    const pending  = allRx.filter(r => r.status === 'pending').length;
    const approved = allRx.filter(r => r.status === 'approved').length;
    const rejected = allRx.filter(r => r.status === 'rejected').length;
    document.getElementById('cnt-pending').textContent  = pending;
    document.getElementById('cnt-approved').textContent = approved;
    document.getElementById('cnt-rejected').textContent = rejected;
    document.getElementById('cnt-total').textContent    = allRx.length;

    renderTable();
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('403')) {
      window.location.href = 'admin-login.html';
    } else {
      showAlert(err.message);
    }
  }
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = allRx.filter(r => {
    if (!q) return true;
    return (r.userId?.name?.toLowerCase().includes(q)) || (r.userId?.email?.toLowerCase().includes(q));
  });
  document.getElementById('rx-count').textContent = filtered.length + ' prescriptions';
  const tbody = document.getElementById('rx-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:40px">No prescriptions found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const date  = new Date(r.uploadedAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    const isImg = /\.(jpg|jpeg|png)$/i.test(r.url);
    return `
      <tr>
        <td>
          <div style="font-weight:600">${r.userId?.name || 'N/A'}</div>
          <div style="font-size:12px;color:#64748b">${r.userId?.email || ''}</div>
        </td>
        <td>
          <span style="display:flex;align-items:center;gap:6px;font-size:13px">
            <i class="fas ${isImg ? 'fa-image' : 'fa-file-pdf'}" style="color:#2563eb"></i>
            ${r.filename}
          </span>
        </td>
        <td style="font-size:13px;color:#64748b">${date}</td>
        <td>${badgeHtml(r.status)}</td>
        <td style="font-size:13px;color:#475569;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.adminNote || '—'}</td>
        <td style="text-align:right;white-space:nowrap">
          <a href="${r.url}" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-external-link-alt"></i> View</a>
          ${r.status === 'pending'
            ? `<button class="btn btn-primary btn-sm" style="margin-left:6px" onclick="openReview('${r._id}')"><i class="fas fa-check"></i> Review</button>`
            : `<button class="btn btn-ghost btn-sm" style="margin-left:6px" onclick="openReview('${r._id}')"><i class="fas fa-edit"></i> Edit</button>`}
        </td>
      </tr>`;
  }).join('');
}

function openReview(id) {
  const r = allRx.find(x => x._id === id);
  if (!r) return;
  document.getElementById('review-id').value      = id;
  document.getElementById('review-patient').textContent = (r.userId?.name || 'N/A') + ' — ' + (r.userId?.email || '');
  document.getElementById('review-note').value    = r.adminNote || '';
  const isImg = /\.(jpg|jpeg|png)$/i.test(r.url);
  document.getElementById('preview-container').innerHTML = isImg
    ? `<img src="${r.url}" class="rx-preview" alt="Prescription">`
    : `<a href="${r.url}" target="_blank" class="btn btn-outline"><i class="fas fa-file-pdf"></i> Open PDF</a>`;
  document.getElementById('review-modal').classList.add('open');
}

async function submitReview(status) {
  const id   = document.getElementById('review-id').value;
  const note = document.getElementById('review-note').value.trim();
  try {
    await PrescriptionAPI.review(id, { status, adminNote: note });
    showAlert('Prescription ' + status, 'success');
    closeModal();
    loadPrescriptions();
  } catch (err) {
    showAlert(err.message);
  }
}

function closeModal() { document.getElementById('review-modal').classList.remove('open'); }
document.getElementById('review-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

/* Admin guard */
if (sessionStorage.getItem('adminGateway') !== 'genezenz-pharmacy-admin-2025') {
  document.body.innerHTML = '';
  window.location.replace('admin-login.html'); // must enter via proper admin entry point
} else {
  const u = currentUser();
  if (!u || !u.isAdmin) {
    document.body.innerHTML = '';
    window.location.replace('admin-login.html');
  } else {
    document.getElementById('admin-name').textContent   = u.name || 'Admin';
    document.getElementById('admin-avatar').textContent = (u.name || 'A')[0].toUpperCase();
    loadPrescriptions();
  }
}
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
