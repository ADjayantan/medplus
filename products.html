<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — MedPlus Pharmacy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/cart.css">
<link rel="stylesheet" href="css/products.css">
</head>
<body>

<!-- Shared navbar injected here -->
<div id="navbar-placeholder"></div>

<main class="page-shell">
  <div class="page-container">

    <!-- Page Header -->
    <div class="page-header" style="margin-bottom:1.5rem">
      <h1 class="page-title" style="font-size:1.5rem;font-weight:700;color:var(--text-primary)">
        <i class="fas fa-pills" style="color:var(--teal-500);margin-right:.5rem"></i> All Products
      </h1>
      <span id="results-count" style="font-size:.85rem;color:var(--text-secondary);margin-left:auto"></span>
    </div>

    <!-- Category Cards (top) -->
    <div id="category-cards" style="margin-bottom:1.5rem"></div>

    <!-- Filters Row -->
    <div class="filters-row" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1.25rem">

      <!-- Search -->
      <div style="position:relative;flex:1;min-width:200px;max-width:340px">
        <input id="search-bar" type="text" class="form-input"
               placeholder="Search medicines, brands…"
               style="padding-left:2.25rem"
               onkeydown="if(event.key==='Enter')filterAndRender()">
        <i class="fas fa-search" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);pointer-events:none"></i>
        <div id="autocomplete-list" class="autocomplete-dropdown" style="display:none"></div>
      </div>

      <!-- Category Tabs -->
      <div id="category-tabs" style="display:flex;flex-wrap:wrap;gap:.4rem"></div>

      <!-- Sort -->
      <select id="sort-select" class="form-input" style="width:auto;min-width:150px" onchange="filterAndRender()">
        <option value="">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="rating">Top Rated</option>
        <option value="discount">Best Discount</option>
        <option value="name">Name A → Z</option>
      </select>

      <!-- Price Filter -->
      <div style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text-secondary)">
        <i class="fas fa-rupee-sign"></i>
        <input id="price-filter" type="range" min="0" max="2000" value="2000" step="50"
               oninput="document.getElementById('price-label').textContent='Under ₹'+this.value;filterAndRender()"
               style="width:100px;accent-color:var(--teal-500)">
        <span id="price-label" style="white-space:nowrap;font-weight:600;color:var(--text-primary)">Under ₹2000</span>
      </div>

      <!-- In Stock Toggle -->
      <label style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;cursor:pointer;color:var(--text-secondary)">
        <input id="in-stock-toggle" type="checkbox" onchange="filterAndRender()" style="accent-color:var(--teal-500)">
        In Stock Only
      </label>

      <!-- Rx Filter -->
      <select id="rx-filter" class="form-input" style="width:auto;min-width:110px;font-size:.85rem" onchange="filterAndRender()">
        <option value="">All Types</option>
        <option value="otc">OTC Only</option>
        <option value="rx">Rx Only</option>
      </select>

    </div>

    <!-- Product stat -->
    <div id="product-stat" style="font-size:.82rem;color:var(--text-secondary);margin-bottom:1rem"></div>

    <!-- Products Section -->
    <section id="products-section">
      <div id="products-grid" class="products-grid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-secondary)">
          <i class="fas fa-circle-notch fa-spin" style="font-size:2rem;margin-bottom:1rem;display:block;color:var(--teal-400)"></i>
          Loading products…
        </div>
      </div>
    </section>

  </div>
</main>

<!-- Product Modal -->
<div id="product-modal"></div>

<!-- Footer -->
<footer class="footer" role="contentinfo">
  <p>&copy; 2025 MedPlus Pharmacy. All rights reserved.</p>
</footer>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>
<script src="js/main.js"></script>
<script src="js/navbar.js"></script>
<script>
MedNavbar.init('products');
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
