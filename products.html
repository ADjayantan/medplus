<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — MedPlus Pharmacy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/products.css">
<link rel="stylesheet" href="css/cart.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<!-- Shared navbar injected here -->
<div id="navbar-placeholder"></div>

<!-- Category Bar -->
<div class="category-section">
  <div class="category-scroll" id="category-tabs"><!-- rendered by JS --></div>
</div>

<!-- Category Cards -->
<div class="cat-cards-section">
  <div class="container" style="max-width:1280px;margin:0 auto;padding:0 1.25rem">
    <h2 class="cat-cards-title">Shop by Category</h2>
    <div class="cat-cards-grid" id="category-cards"><!-- rendered by JS --></div>
  </div>
</div>

<!-- Toolbar -->
<div class="products-toolbar" id="products-section">
  <div class="toolbar-left">
    <span class="results-count" id="results-count">Loading…</span>
    <div class="toolbar-filters">
      <select id="sort-select" onchange="filterAndRender()">
        <option value="name">Sort: A–Z</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="discount">Biggest Discount</option>
      </select>
      <select id="rx-filter" onchange="filterAndRender()">
        <option value="">All Products</option>
        <option value="otc">OTC Only</option>
        <option value="rx">Prescription Only</option>
      </select>
      <div class="price-filter-wrap">
        <label style="font-size:12px;color:#64748b;display:block;margin-bottom:2px">
          Max price: <span id="price-label">Any price</span>
        </label>
        <input type="range" id="price-filter" min="10" max="1200" value="1200" step="10"
               oninput="updatePriceLabel();filterAndRender()" style="width:120px"
               aria-label="Maximum price filter">
      </div>
    </div>
  </div>
  <div class="toolbar-right">
    <label class="toggle-label">
      <input type="checkbox" id="in-stock-toggle" onchange="filterAndRender()">
      <span class="toggle-text">
        <i class="fas fa-check-circle" style="color:#22c55e" aria-hidden="true"></i> In Stock Only
      </span>
    </label>
    <button class="btn-clear-filter" onclick="clearFilters()">
      <i class="fas fa-times" aria-hidden="true"></i> Clear
    </button>
  </div>
</div>

<!-- Products Grid -->
<div class="products-section">
  <div class="container" style="max-width:1280px;margin:0 auto;padding:0 1.25rem">
    <div class="products-grid" id="products-grid">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <p>Loading medicines…</p>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div id="product-modal"></div>

<!-- Auth Modal -->
<div class="auth-modal-overlay" id="auth-modal-overlay" role="dialog" aria-modal="true" aria-label="Authentication">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuthModal()" aria-label="Close">
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
    <div id="auth-modal-body"></div>
  </div>
</div>

<!-- Shared footer -->
<footer class="footer" role="contentinfo">
  <p>
    <a href="index.html"><strong>MedPlus</strong></a> &nbsp;|&nbsp;
    <a href="products.html">Products</a> &nbsp;|&nbsp;
    <a href="insurance.html">Insurance</a> &nbsp;|&nbsp;
    <a href="upload-prescription.html">Upload Rx</a> &nbsp;|&nbsp;
    <a href="cart.html">Cart</a>
  </p>
  <p style="margin-top:8px">&copy; 2025 MedPlus Pharmacy. All rights reserved.</p>
</footer>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/navbar.js"></script>
<script>
MedNavbar.init('');

/* Sticky offsets */
function updateStickyOffsets() {
  const navbar = document.getElementById('main-navbar');
  const catBar = document.querySelector('.category-section');
  if (!navbar || !catBar) return;
  const navH = navbar.getBoundingClientRect().height;
  const catH = catBar.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--navbar-height', navH + 'px');
  document.documentElement.style.setProperty('--category-height', catH + 'px');
}
window.addEventListener('scroll', updateStickyOffsets, { passive: true });
window.addEventListener('resize', updateStickyOffsets);
setTimeout(updateStickyOffsets, 150);

/* Pre-select category / query from URL */
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('category');
  if (cat) {
    const interval = setInterval(() => {
      const btn = document.querySelector(`.cat-tab[data-cat="${cat}"]`);
      if (btn) { clearInterval(interval); setCategory(cat, btn); }
    }, 100);
  }
  const q = params.get('q');
  if (q) {
    const sb = document.getElementById('search-bar');
    if (sb) sb.value = q;
  }
  setTimeout(updateStickyOffsets, 100);
  window.addEventListener('resize', updateStickyOffsets);
});
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
