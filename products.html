<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — MedPlus Pharmacy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/products.css">
<link rel="stylesheet" href="css/cart.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar" id="main-navbar">
  <div class="navbar-top">
    <div class="container">
      <div class="top-links">
        <a href="tel:1800-123-456"><i class="fas fa-phone-alt"></i> 1800-123-456</a>
        <a href="mailto:support@medplus.com"><i class="fas fa-envelope"></i> support@medplus.com</a>
      </div>
      <div class="top-links">
        <a onclick="window.location.href='upload-prescription.html'"><i class="fas fa-file-prescription"></i> Upload Rx</a>
        <a onclick="window.location.href='insurance.html'"><i class="fas fa-shield-alt"></i> Insurance</a>
      </div>
    </div>
  </div>
  <div class="navbar-main">
    <div class="container">
      <div class="nav-logo" onclick="window.location.href='index.html'">
        <div class="nav-logo-icon">M+</div>
        <span class="nav-logo-text">Med<span>Plus</span></span>
      </div>

      <div class="nav-search">
        <div class="nav-search-inner">
          <input type="text" id="search-bar" placeholder="Search medicines, brands..." autocomplete="off">
          <button onclick="filterAndRender()"><i class="fas fa-search"></i></button>
        </div>
        <div id="autocomplete-list" class="autocomplete-dropdown"></div>
      </div>

      <div class="nav-actions">
        <a href="index.html" class="nav-btn nav-btn-ghost">
          <i class="fas fa-home"></i> <span>Home</span>
        </a>
        <a href="login.html" class="nav-btn nav-btn-ghost" id="nav-login" style="display:none;text-decoration:none">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <button class="nav-btn nav-btn-ghost" id="nav-profile" onclick="window.location.href='profile.html'" style="display:none">
          <i class="fas fa-user"></i>
        </button>
        <button class="nav-btn nav-btn-ghost" id="nav-admin" onclick="window.location.href='admin-dashboard.html'" style="display:none">
          <i class="fas fa-user-shield"></i>
        </button>
        <a href="cart.html" class="nav-btn nav-btn-cart" id="nav-cart">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
          <span id="cart-total-nav"></span>
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- ── Category Bar ── -->
<div class="category-section">
  <div class="category-scroll" id="category-tabs">
    <!-- rendered by JS -->
  </div>
</div>

<!-- ── Category Cards Hero ── -->
<div class="cat-cards-section">
  <div class="container" style="max-width:1280px;margin:0 auto;padding:0 1.25rem">
    <h2 class="cat-cards-title">Shop by Category</h2>
    <div class="cat-cards-grid" id="category-cards">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="products-toolbar" id="products-section">
  <div class="toolbar-left">
    <span class="results-count" id="results-count">Loading...</span>
    <div class="toolbar-filters">
      <select id="sort-select" onchange="filterAndRender()">
        <option value="name">Sort: A–Z</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="discount">Biggest Discount</option>
      </select>
      <select id="rx-filter" onchange="filterAndRender()">
        <option value="">All Products</option>
        <option value="otc">OTC Only</option>
        <option value="rx">Prescription Only</option>
      </select>
      <div class="price-filter-wrap">
        <label style="font-size:12px;color:#64748b;display:block;margin-bottom:2px">Max price: <span id="price-label">Any price</span></label>
        <input type="range" id="price-filter" min="10" max="1200" value="1200" step="10"
               oninput="updatePriceLabel();filterAndRender()" style="width:120px">
      </div>
    </div>
  </div>
  <div class="toolbar-right">
    <label class="toggle-label">
      <input type="checkbox" id="in-stock-toggle" onchange="filterAndRender()">
      <span class="toggle-text"><i class="fas fa-check-circle" style="color:#22c55e"></i> In Stock Only</span>
    </label>
    <button class="btn-clear-filter" onclick="clearFilters()">
      <i class="fas fa-times"></i> Clear
    </button>
  </div>
</div>

<!-- ── Products Grid ── -->
<div class="products-section">
  <div class="container" style="max-width:1280px; margin:0 auto; padding:0 1.25rem">
    <div class="products-grid" id="products-grid">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <p>Loading medicines...</p>
      </div>
    </div>
  </div>
</div>


<!-- Product Modal Container -->
<div id="product-modal"></div>

<!-- Auth Modal -->
<div class="auth-modal-overlay" id="auth-modal-overlay">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuthModal()"><i class="fas fa-times"></i></button>
    <div id="auth-modal-body"></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer" style="margin-top:3rem">
  <p>&copy; 2024 MedPlus Pharmacy. All rights reserved. |
     <a href="index.html">Home</a> &nbsp;|&nbsp;
     <a href="insurance.html">Insurance</a> &nbsp;|&nbsp;
     <a href="upload-prescription.html">Upload Rx</a>
  </p>
</footer>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
// Pre-select category from URL param
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const cat    = params.get('category');
  if (cat) {
    // Wait for categories to load then activate
    const interval = setInterval(() => {
      const btn = document.querySelector(`.cat-tab[data-cat="${cat}"]`);
      if (btn) { clearInterval(interval); setCategory(cat, btn); }
    }, 100);
  }
  const q = params.get('q');
  if (q) {
    const sb = document.getElementById('search-bar');
    if (sb) { sb.value = q; }
  }
});
</script>
</body>
</html>
