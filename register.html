<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Genezenz Pharmacy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/auth.css">
<style>
body { background: linear-gradient(135deg, #0d2b2e 0%, #1a5454 50%, #2ea89a 100%); min-height: 100vh; display: flex; flex-direction: column; }
.auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.auth-card { animation: slideUp .4s ease; max-width: 480px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.brand-back { display: flex; justify-content: center; margin-bottom: 1.5rem; }
.brand-link { display: flex; align-items: center; gap: .5rem; text-decoration: none; font-weight: 800; font-size: 1.1rem; }
.brand-icon { width: 36px; height: 36px; background: rgba(255,255,255,.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; font-size: .9rem; }
.pwd-strength { height: 4px; border-radius: 4px; background: #e5e7eb; margin-top: .5rem; overflow: hidden; }
.pwd-strength-bar { height: 100%; border-radius: 4px; transition: width .3s, background .3s; width: 0; }
</style>
</head>
<body>

<div class="auth-page">
  <div style="width:100%;max-width:480px">

    <div class="brand-back">
      <a href="index.html" class="brand-link">
        <div class="brand-icon">GZ</div>
        <span style="color:#fff">Genezenz Pharmacy</span>
      </a>
    </div>

    <div class="auth-card">

      <div class="auth-logo">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--teal-400),var(--teal-600));border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem">
          <i class="fas fa-user-plus"></i>
        </div>
      </div>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Join Genezenz Pharmacy for fast medicine delivery</p>

      <div class="auth-error" id="reg-error"></div>
      <div id="reg-success" style="display:none;background:var(--green-50);border:1.5px solid var(--green-200);border-radius:10px;padding:.875rem 1rem;font-size:.875rem;color:var(--green-700);margin-bottom:1rem">
        <i class="fas fa-check-circle"></i> Account created! Redirecting to login…
      </div>

      <form class="auth-form" onsubmit="doRegister(event)">

        <div class="form-grid">
          <div class="form-group">
            <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">First Name <span style="color:#ef4444">*</span></label>
            <input type="text" id="reg-fname" class="input" style="margin-top:.35rem" placeholder="First name" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">Last Name</label>
            <input type="text" id="reg-lname" class="input" style="margin-top:.35rem" placeholder="Last name" autocomplete="family-name">
          </div>
        </div>

        <div class="form-group full">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">Email Address <span style="color:#ef4444">*</span></label>
          <div style="position:relative;margin-top:.35rem">
            <i class="fas fa-envelope" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.875rem"></i>
            <input type="email" id="reg-email" class="input" style="padding-left:2.75rem" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group full">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">Phone Number</label>
          <div style="position:relative;margin-top:.35rem">
            <i class="fas fa-phone" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.875rem"></i>
            <input type="tel" id="reg-phone" class="input" style="padding-left:2.75rem" placeholder="10-digit mobile number" autocomplete="tel" maxlength="10">
          </div>
        </div>

        <div class="form-group full">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">Password <span style="color:#ef4444">*</span></label>
          <div class="input-eye-wrap" style="margin-top:.35rem">
            <i class="fas fa-lock" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.875rem;z-index:1"></i>
            <input type="password" id="reg-password" class="input" style="padding-left:2.75rem" placeholder="Min. 6 characters"
                   autocomplete="new-password" required minlength="6" oninput="checkStrength(this.value)">
            <button type="button" class="eye-btn" onclick="togglePwd('reg-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="pwd-strength"><div class="pwd-strength-bar" id="pwd-bar"></div></div>
          <div id="pwd-label" style="font-size:.72rem;margin-top:.25rem;color:var(--text-secondary)"></div>
        </div>

        <div class="form-group full">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary)">Confirm Password <span style="color:#ef4444">*</span></label>
          <div class="input-eye-wrap" style="margin-top:.35rem">
            <i class="fas fa-lock" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.875rem;z-index:1"></i>
            <input type="password" id="reg-confirm" class="input" style="padding-left:2.75rem" placeholder="Repeat password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('reg-confirm', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display:flex;align-items:flex-start;gap:.6rem;padding:.75rem;background:var(--bg-muted);border-radius:10px;font-size:.82rem;color:var(--text-secondary)">
          <input type="checkbox" id="reg-terms" required style="margin-top:2px;flex-shrink:0">
          <label for="reg-terms">
            I agree to the <a href="#" style="color:var(--teal-600);font-weight:600">Terms of Service</a> and
            <a href="#" style="color:var(--teal-600);font-weight:600">Privacy Policy</a> of Genezenz Pharmacy.
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="reg-btn" style="margin-top:.25rem">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-switch" style="margin-top:1.25rem">
        Already have an account?
        <a href="login.html" style="color:var(--teal-600);font-weight:700;text-decoration:none">Sign in</a>
      </div>

      <div style="text-align:center;margin-top:.75rem">
        <a href="index.html" style="font-size:.82rem;color:var(--text-secondary);text-decoration:none">
          <i class="fas fa-arrow-left"></i> Back to store
        </a>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>if (isLoggedIn()) window.location.href = 'index.html';

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.innerHTML = inp.type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
}

function checkStrength(val) {
  const bar   = document.getElementById('pwd-bar');
  const label = document.getElementById('pwd-label');
  if (!bar || !label) return;
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { pct: '20%', color: '#ef4444', text: 'Very weak' },
    { pct: '40%', color: '#f97316', text: 'Weak' },
    { pct: '60%', color: '#eab308', text: 'Fair' },
    { pct: '80%', color: '#22c55e', text: 'Strong' },
    { pct: '100%', color: '#15803d', text: 'Very strong' },
  ];
  const lvl = levels[Math.max(0, score - 1)] || levels[0];
  bar.style.width = val ? lvl.pct : '0';
  bar.style.background = lvl.color;
  label.textContent = val ? lvl.text : '';
  label.style.color = lvl.color;
}

async function doRegister(e) {
  e.preventDefault();
  const fname   = document.getElementById('reg-fname')?.value.trim();
  const lname   = document.getElementById('reg-lname')?.value.trim();
  const email   = document.getElementById('reg-email')?.value.trim();
  const phone   = document.getElementById('reg-phone')?.value.trim();
  const pwd     = document.getElementById('reg-password')?.value;
  const confirm = document.getElementById('reg-confirm')?.value;
  const errEl   = document.getElementById('reg-error');
  const btn     = document.getElementById('reg-btn');

  errEl.style.display = 'none';

  if (pwd !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }
  if (pwd.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (phone && !/^\d{10}$/.test(phone)) {
    errEl.textContent = 'Please enter a valid 10-digit phone number.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span>Creating account…</span>';

  try {
    const data = await AuthAPI.register({ name: (fname + ' ' + lname).trim(), email, password: pwd, phone });
    localStorage.setItem('genezenz-pharmacy_token', data.token);
    localStorage.setItem('genezenz-pharmacy_user',  JSON.stringify(data.user));
    document.getElementById('reg-success').style.display = 'block';
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } catch (err) {
    errEl.textContent = err.message || 'Registration failed. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
  }
}
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
